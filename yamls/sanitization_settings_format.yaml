# ------------------------------------
# OpenRouter settings
# ------------------------------------
openrouter: True
openrouter_api_key: "<YOUR_OPENROUTER_API_KEY>"
openrouter_server_url: "https://openrouter.ai/api/v1"
openrouter_model_name: "qwen/qwen3-30b-a3b-thinking-2507"

# ------------------------------------
# Local server settings
# ------------------------------------
SERVER_URL: "http://localhost:8000/v1"
MODEL_NAME: "<PATH_OR_MODEL_ID>"
NOTHINK: True

# ------------------------------------
# Inference config
# ------------------------------------
infer_config:
  max_tokens: 16384
  temperature: 0
  top_p: 1.0
batch_size: 2

# ------------------------------------
# Async worker pool settings
# max_in_flight is the global maximum number of external API requests in flight.
# It is separate from batch_size; if omitted, async entrypoints use batch_size.
# ------------------------------------
max_in_flight: 8
max_connections: 8
max_keepalive_connections: 8
connect_timeout: 10
read_timeout: 120
write_timeout: 120
pool_timeout: 30
http2: false

# ------------------------------------
# Prompts
# ------------------------------------
prompts: # 処理の順に並べること
  - jp_en_prompt: ./prompts/sanitization/to_bullet_points.txt
  - en_jp_prompt: ./prompts/sanitization/bullet_points_to_text.txt
  - refine_prompt: 
  - eval_prompt:  ./prompts/sanitization/eval_prompt.txt # 評価用はevalとして分けること

# ------------------------------------
# Output
# ------------------------------------
output_path: ./test_output/test_sanitization

# ------------------------------------
# Retry settings
# ------------------------------------

max_retries: 3
wait_seconds: 5
