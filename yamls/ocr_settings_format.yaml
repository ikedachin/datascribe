# ------------------------------------
# OpenRouter settings
# ------------------------------------
inference_backend: "api_openai_comp"
openrouter_api_key: "<YOUR_OPENROUTER_API_KEY>"
openrouter_server_url: "https://openrouter.ai/api/v1"
openrouter_model_name: "qwen/qwen3-vl-32b-instruct"
openrouter: True # Falseの場合はlocalサーバーを使う



# ------------------------------------
# Local server settings
# ------------------------------------
SERVER_URL: "http://localhost:8000/v1" #"http://<YOUR_SERVER_IP>:8000/v1" #サーバーに変える。例："http://10.255.255.61:8000/v1"
MODEL_NAME: "/home/**/model/base/Qwen3-VL-235B-Instruct" 
#モデルパスに変える。例："/home/**/model/base/Qwen3-VL-32B-Instruct"



# ------------------------------------
# Common settings
# ------------------------------------
infer_config:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 8192
batch_size: 4


# ------------------------------------
# Async worker pool settings
# max_in_flight is the global maximum number of external API requests in flight.
# If omitted, async entrypoints use batch_size as the default.
# ------------------------------------
max_in_flight: 4
max_connections: 4
max_keepalive_connections: 4
connect_timeout: 10
read_timeout: 600
write_timeout: 120
pool_timeout: 30
http2: false

# ------------------------------------
# PDF -> image conversion / PDF-level parallelism (async)
# dpi: ページ画像の解像度。画像トークン量(prefill時間)に直結する。
#      活字OCRなら150-200で十分なことが多い。品質劣化を感じたら300へ。
# pdf_concurrency: 同時に処理するPDF数。max_in_flightは全PDF共有で維持される。
# ------------------------------------
dpi: 200
pdf_concurrency: 2

# ------------------------------------
# OCR debug output settings
# print_step_outputs prints each async OCR worker-pool step result to stdout.
# Set print_step_output_max_chars to 0 to print full responses.
# ------------------------------------
print_step_outputs: true
print_step_output_max_chars: 4000

# ------------------------------------
# Retry settings
# ------------------------------------
max_retries: 5
wait_seconds: 10

# ------------------------------------
# pdfs file paths
# ------------------------------------
pdfs: ./pdfs/

# ------------------------------------
# Prompt file paths
# ------------------------------------
# object detection prompt
prompts:
  - ocr_prompt: ./prompts/ocr/ocr_single_page.txt
  - objects_prompt: ./prompts/ocr/ocr_objects.txt
  - content_understanding_prompt: ./prompts/ocr/ocr_contents.txt
  - figure_understanding_prompt: ./prompts/ocr/ocr_figure.txt
  - table_understanding_prompt: ./prompts/ocr/ocr_table.txt
  - photo_understanding_prompt: ./prompts/ocr/ocr_photo.txt
  - weave_prompt: ./prompts/ocr/ocr_weave.txt



# ------------------------------------
# Reference integration settings (async 2nd pass)
# reference_window: 図表の参照を探す前後ページ数
# bm25_top1_ratio: BM25フォールバックでtop1がtop2の何倍以上なら採用するか
# ------------------------------------
reference_window: 5
bm25_top1_ratio: 1.5

# ------------------------------------
# output directory
# ------------------------------------

output_path: ./test_output/ocr/
