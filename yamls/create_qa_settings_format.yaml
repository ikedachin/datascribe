# ------------------------------------
# OpenRouter settings
# ------------------------------------
openrouter: True
openrouter_api_key: "<YOUR_OPENROUTER_API_KEY>"
openrouter_server_url: "https://openrouter.ai/api/v1"
openrouter_model_name: "qwen/qwen3-30B-A3B-Instruct-2507"

# ------------------------------------
# Local server settings
# ------------------------------------
SERVER_URL: "http://localhost:8000/v1"
MODEL_NAME: "Qwen3-30B-A3B-Instruct-2507"
NOTHINK: True

# ------------------------------------
# Retry settings
# ------------------------------------
max_retries: 15
wait_seconds: 10

# ------------------------------------
# Inference config
# ------------------------------------
infer_config:
  max_tokens: 8192
  temperature: 0
  top_p: 1.0
batch_size: 16

# ------------------------------------
# Async worker pool settings
# max_in_flight is the global maximum number of external API requests in flight.
# It is separate from batch_size; if omitted, async entrypoints use batch_size.
# ------------------------------------
max_in_flight: 16
max_connections: 16
max_keepalive_connections: 16
connect_timeout: 10
read_timeout: 120
write_timeout: 120
pool_timeout: 30
http2: false

# ------------------------------------
# Prompts
# ------------------------------------
prompts:
  - question_prompt: ./prompts/create_qa/qa_create_question.txt
  - thinking_prompt: ./prompts/create_qa/qa_create_thinking.txt
  - answer_prompt: ./prompts/create_qa/qa_create_answer.txt
  - refine_thinking_prompt: ./prompts/create_qa/qa_refine_thinking.txt
  - refine_answer_prompt: ./prompts/create_qa/qa_refine_answer.txt
  
# ------------------------------------
# Output
# ------------------------------------
output_path: ./test_output/test_qa/
